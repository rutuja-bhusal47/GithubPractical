<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">MyWebsite</div>
        <a href="#">Home</a>
        
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Our Website</h1>
            <p>A simple and responsive design built with HTML and CSS.</p>
            <button class="btn">Get Started</button>
        </div>
    </section>

    <section class="features">
        <div class="card">
            <h3>Modern Design</h3>
            <p>Clean layouts that look great on any device screen.</p>
        </div>
        <div class="card">
            <h3>Clean Code</h3>
            <p>Simple and organized CSS styles.</p>
        </div>
        <div class="card">
            <h3>Fast Loading</h3>
            <p>Lightweight fast performance</p>
        </div>
    </section>

    <footer class="footer">
        <p>&copy; 2026 MyWebsite. All rights reserved.</p>
    </footer>

</body>
</html>
